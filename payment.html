<!DOCTYPE html>
<html>
<head>
  <title>Card Payment Form</title>
  <style>
    body {
      font-family: Arial;
      background: #C0C0C0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card-form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }
  </style>
</head>

<body>

  <div class="card-form">
    <h3>Payment Details</h3>

    <input type="text" placeholder="Cardholder Name" required>
    <input type="text" placeholder="Card Number" maxlength="16" required>
    <input type="text" placeholder="Expiry MM/YY" required>
    <input type="text" placeholder="CVV" maxlength="3" required>

    <button type="submit">Pay Now</button>
  </div>

</body>
</html>
